name: Nordic Financial MCP
description: Semantic search over Nordic financial data — filings, press releases, macro summaries, and real-time power prices for Norway, Sweden, Denmark, Finland, and Iceland.
homepage: https://aidatanorge.no

configSchema:
  type: object
  description: Optional configuration for the Nordic Financial MCP server
  properties:
    default_country:
      type: string
      description: Default country filter for searches (NO, SE, DK, FI). Leave empty for all countries.
      default: ""
      enum: ["", "NO", "SE", "DK", "FI"]
    default_limit:
      type: integer
      description: Default number of search results to return (1-20)
      default: 5
      minimum: 1
      maximum: 20
  required: []
  additionalProperties: false

startCommand:
  type: http
  url: https://mcp.aidatanorge.no/mcp
